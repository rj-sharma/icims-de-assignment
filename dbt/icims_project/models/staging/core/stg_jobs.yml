version: 2

models:
  - name: stg_jobs
    columns:
      - name: job_id
        tests:
          - not_null
          - unique

      - name: posted_date
        tests:
          - not_null

      - name: status
        tests:
          - accepted_values:
              values: ['OPEN', 'CLOSED', 'DRAFT']

      - name: _batch_id
        tests:
          - not_null

      - name: _record_hash
        tests:
          - not_null
