version: 2

models:
  - name: stg_educations
    columns:
      - name: candidate_id
        tests:
          - not_null
          - unique

      - name: degree
        tests:
          - not_null
          - accepted_values:
              values: ['MS', 'BS', 'PHD']

      - name: _batch_id
        tests:
          - not_null

      - name: _record_hash
        tests:
          - not_null
